<html>
  <head>
    <title>Resepku 1</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="./style.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite"
    />
  </head>

  <body>
    <!-- Card 1 -->
    <div class="card-container">
      <div class="card bg-white rounded-xl">
        <div class="photo relative">
          <div
            class="favorite-icon absolute bg-white p-2 rounded-full right-2 top-2 cursor-pointer"
          >
            <span class="material-symbols-rounded text-gray-300">
              favorite
            </span>
          </div>
          <img src="nasi-goreng.png" alt="Nasi Goreng Kampung" />
        </div>

        <div class="desc py-4 px-5 flex flex-col justify-between">
          <div class="flex flex-col gap-y-2 font-inter">
            <h2 class="text-lg text-blue-950 font-bold text-lg">
              Nasi Goreng Kampung
            </h2>
            <p class="text-gray-500">
              Nasi goreng tradisional dengan bumbu rumahan, terasi pedas, dan
              kerupuk renyah.
            </p>
          </div>

          <div
            class="other flex justify-between border-t border-amber-100 pt-2"
          >
            <div class="timer-badge flex gap-x-4 items-center">
              <span class="timer text-sm text-gray-500"> ⏱ 25 mnt </span>
              <div
                class="badge px-2 py-1 bg-green-100 rounded-2xl text-xs font-bold text-green-600"
              >
                MUDAH
              </div>
            </div>

            <div class="user flex items-center gap-x-2">
              <span
                class="p-2 px-3 bg-orange-600 rounded-full text-white font-bold"
                >B</span
              >
              <span class="text-blue-950 text-xs">Budi</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
